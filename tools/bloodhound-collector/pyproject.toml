[project]
name = "athena-tool-bloodhound-collector"
version = "0.1.0"
description = "Athena MCP tool server: BloodHound AD environment graph collection"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.6.0",
    "bloodhound>=1.7.1",
    "neo4j>=5.0.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.23.0",
]

[tool.setuptools]
py-modules = ["server"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
