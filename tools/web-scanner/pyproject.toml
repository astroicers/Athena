[project]
name = "athena-tool-web-scanner"
version = "0.1.0"
description = "Athena MCP tool server: Web vulnerability scanning (httpx + Nuclei)"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.6.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.23.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
