version: "3.8"

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: athena
      POSTGRES_USER: athena
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-athena_secret}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U athena"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "0.0.0.0:58000:8000"
    volumes:
      - backend-data:/app/data
      - ./mcp_servers.json:/app/mcp_servers.json:ro
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql://athena:${POSTGRES_PASSWORD:-athena_secret}@postgres:5432/athena
      - C2_ENGINE_URL=http://c2-engine:8888
      - C2_ENGINE_API_KEY=${C2_ENGINE_API_KEY:-ADMIN123456}
      - MSF_RPC_HOST=msf-rpc
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - LLM_BACKEND=oauth
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "0.0.0.0:58080:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api
      - NEXT_PUBLIC_WS_URL=ws://localhost:58000/ws
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # C2 Attack Execution Engine (Apache 2.0) — optional, enable with: docker-compose --profile c2 up
  c2-engine:
    image: ghcr.io/mitre/caldera:latest
    profiles: [c2]
    ports:
      - "0.0.0.0:58888:8888"
    volumes:
      - ./infra/c2-engine/local.yml:/usr/src/app/conf/local.yml
      - c2-engine-data:/usr/src/app/data
    restart: unless-stopped

  # Metasploit RPC — optional, enable with: docker compose --profile msf up -d
  msf-rpc:
    image: metasploitframework/metasploit-framework:latest
    profiles: [msf]
    ports:
      # RPC management port — localhost only, never exposed externally
      - "127.0.0.1:55553:55553"
      # SPEC-054 reverse-shell payload handler port. Bound on 0.0.0.0
      # so an external relay machine can reach it via SSH reverse
      # tunnel (relay listens on 0.0.0.0:4444 and forwards back here).
      # Matches settings.RELAY_LPORT default.
      - "0.0.0.0:4444:4444"
    entrypoint: []
    command: >
      /usr/src/metasploit-framework/msfrpcd -P ${MSF_RPC_PASSWORD:-msf_password}
      -U ${MSF_RPC_USER:-msf} -a 0.0.0.0 -p 55553 -S -f
    restart: unless-stopped

  # MCP shared base image — build first with: make build-mcp-base
  mcp-base:
    build:
      context: ./tools
      dockerfile: Dockerfile.base
    image: athena-mcp-base:latest
    profiles: [build-only]

  # MCP Tool Servers — optional, enable with: docker compose --profile mcp up -d
  mcp-nmap:
    build: { context: ./tools/nmap-scanner }
    profiles: [mcp]
    command: ["python", "-m", "server", "--transport", "streamable-http", "--port", "8080"]
    ports:
      - "127.0.0.1:58091:8080"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  mcp-osint:
    build: { context: ./tools/osint-recon }
    profiles: [mcp]
    command: ["python", "-m", "server", "--transport", "streamable-http", "--port", "8080"]
    ports:
      - "127.0.0.1:58092:8080"
    restart: unless-stopped

  mcp-vuln:
    build: { context: ./tools/vuln-lookup }
    profiles: [mcp]
    command: ["python", "-m", "server", "--transport", "streamable-http", "--port", "8080"]
    environment:
      - NVD_API_KEY=${NVD_API_KEY:-}
    ports:
      - "127.0.0.1:58093:8080"
    restart: unless-stopped

  mcp-credential-checker:
