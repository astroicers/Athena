[project]
name = "athena-tool-credential-checker"
version = "0.1.0"
description = "Athena MCP tool server: SSH, RDP, WinRM, MySQL, PostgreSQL, and FTP credential testing"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.6.0",
    "asyncssh>=2.14.0",
    "pywinrm>=0.4.3",
    "pymysql>=1.1.0",
    "psycopg2-binary>=2.9.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.23.0",
]

[tool.setuptools]
py-modules = ["server"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
