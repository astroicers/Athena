[project]
name = "athena-tool-osint-recon"
version = "0.1.0"
description = "Athena MCP tool server: OSINT subdomain enumeration and DNS resolution"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.6.0",
    "httpx>=0.27",
    "dnspython>=2.4",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.23.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
