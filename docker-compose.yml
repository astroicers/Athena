    profiles: [mcp]
    command: ["python", "-m", "server", "--transport", "streamable-http", "--port", "8080"]
    environment:
      - NUCLEI_TEMPLATES_DIR=/opt/nuclei-templates
      - SCAN_RATE_LIMIT=100
      - SCAN_TIMEOUT_SEC=300
    ports:
      - "127.0.0.1:58096:8080"
    extra_hosts:
