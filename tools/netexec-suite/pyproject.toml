[project]
name = "athena-tool-netexec-suite"
version = "0.1.0"
description = "Athena MCP tool server: NetExec multi-protocol AD enumeration and execution"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.6.0",
    # NetExec is invoked as `nxc` subprocess; install from git in Dockerfile
    # because pypi has no `netexec` package (the project is only on GitHub).
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.23.0",
]

[tool.setuptools]
py-modules = ["server"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
