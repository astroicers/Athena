[project]
name = "athena-tool-nmap-scanner"
version = "0.1.0"
description = "Athena MCP tool server: nmap port scanner and service detection"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.6.0",
    "python-nmap>=0.7.1",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.23.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
