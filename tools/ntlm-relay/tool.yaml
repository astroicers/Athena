# Athena MCP Tool Metadata
tool_id: "ntlm-relay"
name: "NTLM Relay Suite"
description: "NTLM relay attacks: relay to LDAP (RBCD delegation), relay to SMB (command exec), with listener lifecycle"
category: "credential_access"
risk_level: "critical"
mitre_techniques: ["T1557.001", "T1550.002"]
output_traits: ["ad.relay_session", "ad.relay_result", "ad.relay_delegated", "credential.shell", "ad.relay_stopped"]

mcp:
  transport: "stdio"
  command: "python"
  args: ["-m", "server"]
  http_url: "http://mcp-ntlm-relay:8080/mcp"
  tool_prefix: "ntlm_relay"

docker:
  port: 58112
  environment: {}
