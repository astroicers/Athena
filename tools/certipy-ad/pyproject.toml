[project]
name = "athena-tool-certipy-ad"
version = "0.1.0"
description = "Athena MCP tool server: Certipy AD Certificate Services exploitation"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.6.0",
    "certipy-ad>=4.8.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.23.0",
]

[tool.setuptools]
py-modules = ["server"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
