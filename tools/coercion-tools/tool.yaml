# Athena MCP Tool Metadata
tool_id: "coercion-tools"
name: "Authentication Coercion"
description: "Authentication coercion attacks: PetitPotam (MS-EFSR), PrinterBug (MS-RPRN), DFSCoerce (MS-DFSNM), coercion scanning"
category: "credential_access"
risk_level: "high"
mitre_techniques: ["T1187", "T1557.001"]
output_traits: ["ad.coercion_result", "ad.coerced_auth", "ad.coercion_method"]

mcp:
  transport: "stdio"
  command: "python"
  args: ["-m", "server"]
  http_url: "http://mcp-coercion-tools:8080/mcp"
  tool_prefix: "coercion"

docker:
  port: 58110
  environment: {}
