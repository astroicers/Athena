version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "0.0.0.0:58000:8000"
    volumes:
      - backend-data:/app/data
    env_file:
      - .env
    environment:
      - DATABASE_URL=sqlite:///app/data/athena.db
      - CALDERA_URL=http://caldera:8888
      - CALDERA_API_KEY=${CALDERA_API_KEY:-ADMIN123456}
    depends_on:
      caldera:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "0.0.0.0:58080:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api
      - NEXT_PUBLIC_WS_URL=ws://localhost:58000/ws
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  # MITRE Caldera — 攻擊執行引擎 (Apache 2.0)
  caldera:
    image: ghcr.io/mitre/caldera:latest
    ports:
      - "0.0.0.0:58888:8888"
    volumes:
      - ./caldera/local.yml:/usr/src/app/conf/local.yml
      - caldera-data:/usr/src/app/data
    restart: unless-stopped

volumes:
  backend-data:
    driver: local
  caldera-data:
    driver: local
