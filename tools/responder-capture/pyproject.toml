[project]
name = "athena-tool-responder-capture"
version = "0.1.0"
description = "Athena MCP tool server: Responder LLMNR/NBT-NS poisoning and hash capture"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.6.0",
    # Responder itself is invoked as subprocess (RESPONDER_PATH="/opt/Responder/Responder.py"),
    # this tool's server.py is just a subprocess wrapper; no netifaces binding needed here.
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.23.0",
]

[tool.setuptools]
py-modules = ["server"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
