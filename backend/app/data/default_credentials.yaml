version: "1.0"
# Source: initial_access_engine.py _CREDS_BY_PROTOCOL (lines 35-75)
# Default credentials by protocol family: protocol -> list of [username, password]
credentials:
  ssh:
    # Linux distro & Vagrant box defaults (sorted by likelihood)
    - [vagrant, vagrant]
    - [ubuntu, ubuntu]
    - [pi, raspberry]
    - [ec2-user, ec2-user]
    - [centos, centos]
    - [debian, debian]
    # Common weak / default passwords
    - [root, root]
    - [root, toor]
    - [root, password]
    - [admin, admin]
    - [admin, password]
    - [administrator, administrator]
    # Lab / CTF environments
    - [msfadmin, msfadmin]
    - [user, user]
    # Network appliances
    - [cisco, cisco]
    - [ubnt, ubnt]
    - [apc, apc]
  windows:
    # AD / Windows defaults (shared by RDP and WinRM)
    - [Administrator, Password1]
    - [Administrator, "P@ssw0rd"]
    - [Administrator, Admin123]
    - [Administrator, administrator]
    - [admin, admin]
    - [admin, password]
    - [admin, "P@ssw0rd"]
    # Service accounts
    - [svc_sql, Password1]
    - [svc_backup, Password1]
    # Lab / evaluation VMs
    - [vagrant, vagrant]
    - [IEUser, "Passw0rd!"]
  # SPEC-056: Multi-protocol credential spray extension
  mysql:
    # MySQL root no-password (metasploitable2 default, common in dev/CTF)
    - [root, ""]
    - [root, root]
    - [root, password]
    - [mysql, mysql]
    - [admin, admin]
    - [dbadmin, dbadmin]
  postgresql:
    # PostgreSQL postgres no-password (metasploitable2 default)
    - [postgres, ""]
    - [postgres, postgres]
    - [postgres, password]
    - [admin, admin]
  ftp:
    # FTP anonymous login (RFC 1635)
    - [anonymous, ""]
    - [anonymous, anonymous]
    - [ftp, ftp]
    - [root, root]
    - [admin, admin]
