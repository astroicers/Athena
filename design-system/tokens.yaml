# Athena Design Tokens — Deep Gemstone Palette v3
# Source of Truth: design/pencil-new-v2.pen (Design Tokens frame)
# CSS Implementation: frontend/src/styles/globals.css
# Tailwind Config: frontend/tailwind.config.ts

meta:
  version: "3.0"
  updated: "2026-03-19"
  source_of_truth: "design/pencil-new-v2.pen"
  css_implementation: "frontend/src/styles/globals.css"
  tailwind_config: "frontend/tailwind.config.ts"
  sync_status: "verified"
  style: "Deep Gemstone — sapphire blue + emerald green + amber gold"

colors:
  background:
    bg-primary:    { value: "#09090B", css: "--color-bg-primary",   tw: "athena-bg",       description: "主背景（鋅黑）" }
    bg-surface:    { value: "#18181B", css: "--color-bg-surface",   tw: "athena-surface",   description: "卡片/面板背景（鋅灰）" }
    bg-elevated:   { value: "#27272A", css: "--color-bg-elevated",  tw: "athena-elevated",  description: "浮層/下拉背景（深鋅）" }
  accent:
    accent:        { value: "#1E6091", css: "--color-accent",       tw: "athena-accent",    description: "寶石藍 — 主要操作/品牌色" }
    accent-hover:  { value: "#1A5276", css: "--color-accent-hover",                         description: "深寶石藍 — hover 態" }
  text:
    primary:       { value: "#D4D4D8", css: "--color-text-primary",   tw: "athena-text",           description: "主文字（鋅白）" }
    light:         { value: "#D4D4D8", css: "--color-text-light",     tw: "athena-text-light",     description: "同 primary（向後相容）" }
    secondary:     { value: "#71717A", css: "--color-text-secondary", tw: "athena-text-secondary", description: "次要文字（鋅灰）" }
    tertiary:      { value: "#52525B", css: "--color-text-tertiary",  tw: "athena-text-tertiary",  description: "輔助文字（暗鋅）" }
  border:
    default:       { value: "#27272A", css: "--color-border",         tw: "athena-border",         description: "預設邊框（鋅邊）" }
    subtle:        { value: "#3F3F46", css: "--color-border-subtle",                               description: "亮鋅邊框" }
  status:
    success:       { value: "#059669", css: "--color-success",    tw: "athena-success",  description: "翡翠綠 — 成功/完成" }
    warning:       { value: "#B45309", css: "--color-warning",    tw: "athena-warning",  description: "琥珀金 — 警告" }
    error:         { value: "#B91C1C", css: "--color-error",      tw: "athena-error",    description: "深紅 — 錯誤" }
    critical:      { value: "#991B1B", css: "--color-critical",   tw: "athena-critical", description: "暗血紅 — 嚴重" }
    info:          { value: "#1E6091", css: "--color-info",                               description: "寶石藍 — 資訊（同 accent）" }
    error-text:    { value: "#DC2626", css: "--color-error-text",                         description: "錯誤文字（高對比版）" }
  effects:
    grid-line:     { value: "rgba(63, 63, 70, 0.25)",  css: "--color-grid-line",  description: "戰術網格線" }
    scanline:      { value: "rgba(30, 96, 145, 0.03)", css: "--color-scanline",   description: "CRT 掃描線" }
    glow-green:    { value: "rgba(5, 150, 105, 0.4)",  css: "--color-glow-green", description: "翡翠光暈" }
    glow-red:      { value: "rgba(185, 28, 28, 0.4)",  css: "--color-glow-red",   description: "深紅光暈" }
    glow-cyan:     { value: "rgba(30, 96, 145, 0.3)",  css: "--color-glow-cyan",  description: "寶石藍光暈" }
  ooda:
    observe:       { value: "#1E6091", css: "--color-phase-observe", description: "寶石藍" }
    orient:        { value: "#7C3AED", css: "--color-phase-orient",  description: "紫水晶" }
    decide:        { value: "#B45309", css: "--color-phase-decide",  description: "琥珀金" }
    act:           { value: "#059669", css: "--color-phase-act",     description: "翡翠綠" }

typography:
  families:
    mono: { value: '"JetBrains Mono", "Fira Code", monospace', css: "--font-mono", description: "主要字體（程式碼、標籤、導航）" }
    sans: { value: '"Inter", system-ui, sans-serif',           css: "--font-sans", description: "輔助字體（內文、描述）" }
  scale:
    caption:         { value: "10px", css: "--fs-caption",         description: "Badge/微型文字" }
    metric-label:    { value: "11px", css: "--fs-metric-label",    description: "指標標籤" }
    floor:           { value: "12px", css: "--fs-floor",           description: "最小字級" }
    heading-card:    { value: "13px", css: "--fs-heading-card",    description: "卡片標題" }
    body:            { value: "14px", css: "--fs-body",            description: "內文" }
    heading-section: { value: "18px", css: "--fs-heading-section", description: "區塊標題" }
    heading-page:    { value: "28px", css: "--fs-heading-page",    description: "頁面標題" }

spacing:
  badge-x: { value: "12px", css: "--sp-badge-x", description: "Badge 水平內距" }
  badge-y: { value: "5px",  css: "--sp-badge-y", description: "Badge 垂直內距" }
  cell:    { value: "14px", css: "--sp-cell",     description: "表格單元格內距" }
  card:    { value: "20px", css: "--sp-card",     description: "卡片內距" }

radius:
  default: { value: "4px", css: "--radius", tw: "rounded-athena", description: "統一圓角（所有元件）" }
