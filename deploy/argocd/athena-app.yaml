apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: athena
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/astroicers/Athena
    targetRevision: athena-2.0
    path: deploy/helm/athena
    helm:
      valueFiles:
        - values.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: athena
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
