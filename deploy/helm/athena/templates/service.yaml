apiVersion: v1
kind: Service
metadata:
  name: {{ include "athena.fullname" . }}
  labels:
    {{- include "athena.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: {{ .Values.config.server.port }}
  selector:
    {{- include "athena.selectorLabels" . | nindent 4 }}
