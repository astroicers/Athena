apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "athena.fullname" . }}-config
data:
  athena.toml: |
    [server]
    host = "{{ .Values.config.server.host }}"
    port = {{ .Values.config.server.port }}

    [database]
    url = "{{ .Values.config.database.url }}"

    [llm]
    default_model = "{{ .Values.config.llm.defaultModel }}"
    mock_mode = {{ .Values.config.llm.mockMode }}

    [mcp]
    base_url = "{{ .Values.config.mcp.baseUrl }}"
    timeout_secs = {{ .Values.config.mcp.timeoutSecs }}
