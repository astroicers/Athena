[project]
name = "athena-tool-vuln-lookup"
version = "0.1.0"
description = "Athena MCP tool server: CVE lookup via NVD API with CPE mapping"
requires-python = ">=3.11"
dependencies = [
    "mcp>=1.6.0",
    "httpx>=0.27",
]

[project.optional-dependencies]
dev = [
    "pytest>=7.4.0",
    "pytest-asyncio>=0.23.0",
]

[tool.pytest.ini_options]
asyncio_mode = "auto"
